name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: sandbox-test
  cancel-in-progress: false

jobs:
  terratest:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            checkpoint-api.hashicorp.com:443
            github.com:22
            github.com:443
            go.dev:443
            golang.org:443
            hosted-compute-watchdog-prod-eus-01.githubapp.com:443
            hosted-compute-watchdog-prod-iad-01.githubapp.com:443
            iam.amazonaws.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            proxy.golang.org:443
            registry.terraform.io:443
            releases.hashicorp.com:443
            storage.googleapis.com:443
            sts.us-east-1.amazonaws.com:443
            sum.golang.org:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/go.mod
          cache: true

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.SANDBOX_APPLY_ROLE }}
          aws-region: us-east-1

      - shell: bash
        working-directory: test
        run: |
          go install github.com/jstemmer/go-junit-report@latest
          go test -timeout 20m -v ./... | tee report.txt
          go-junit-report -set-exit-code < report.txt > report.xml

      - uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2.6
        with:
          paths: test/report.xml
        if: always()
