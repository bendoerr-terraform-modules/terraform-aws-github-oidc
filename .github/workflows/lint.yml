# Thin caller -> reusable lint in bendoerr-terraform-modules/workflows (SHA-pinned, big-blast).
# Full TF-module set, reusable defaults except allowed-endpoints: the reusable's default egress
# list omits proxy.golang.org/sum.golang.org/storage.googleapis.com, which golangci-lint needs on
# a cold module cache (module zips redirect from the proxy to GCS) — established repos coast on
# warm action caches, a fresh repo does not. List = reusable default plus those three.
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  lint:
    permissions:
      contents: read
      pull-requests: write
    uses: bendoerr-terraform-modules/workflows/.github/workflows/lint.yml@93e740f8fea20eda37207f4afd2908325972851e # v1.2.7
    with:
      allowed-endpoints: >
        api.github.com:443
        check.trivy.dev:443
        checkpoint-api.hashicorp.com:443
        dl.google.com:443
        files.pythonhosted.org:443
        ghcr.io:443
        github.com:22
        github.com:443
        go.dev:443
        golang.org:443
        mirror.gcr.io:443
        objects.githubusercontent.com:443
        pkg-containers.githubusercontent.com:443
        proxy.golang.org:443
        pypi.org:443
        raw.githubusercontent.com:443
        registry.npmjs.org:443
        release-assets.githubusercontent.com:443
        releases.hashicorp.com:443
        storage.googleapis.com:443
        sum.golang.org:443
        tuf-repo-cdn.sigstore.dev:443
